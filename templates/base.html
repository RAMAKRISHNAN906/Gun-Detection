<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Weapon Detection System{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    {% block head %}{% endblock %}
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <canvas id="particleCanvas"></canvas>
        <div class="grid-overlay"></div>
    </div>

    <!-- Navigation -->
    <nav class="main-nav" id="mainNav">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <div class="logo-icon">
                    <i class="fas fa-crosshairs"></i>
                </div>
                <span class="logo-text">SENTINEL<span class="logo-accent">AI</span></span>
            </a>
            <div class="nav-links">
                <a href="/" class="nav-link {% block nav_home %}{% endblock %}">
                    <i class="fas fa-home"></i> Home
                </a>
                <a href="/upload" class="nav-link {% block nav_upload %}{% endblock %}">
                    <i class="fas fa-upload"></i> Upload
                </a>
            </div>
            <div class="nav-right">
                {% if user %}
                <div class="nav-user">
                    <div class="user-avatar"><i class="fas fa-user"></i></div>
                    <span class="user-name">{{ user.fullname }}</span>
                </div>
                <a href="/logout" class="nav-link nav-logout" title="Logout">
                    <i class="fas fa-right-from-bracket"></i> Logout
                </a>
                {% endif %}
                <div class="nav-status">
                    <div class="status-dot"></div>
                    <span>System Active</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Floating Elements -->
    <div class="floating-elements">
        <div class="floating-icon fi-1"><i class="fas fa-shield-halved"></i></div>
        <div class="floating-icon fi-2"><i class="fas fa-eye"></i></div>
        <div class="floating-icon fi-3"><i class="fas fa-microchip"></i></div>
        <div class="floating-icon fi-4"><i class="fas fa-satellite-dish"></i></div>
    </div>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/particles.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
